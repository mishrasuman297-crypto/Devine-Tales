<!DOCTYPE html>
<html>
<head>
    <title>Divine Tales</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>🌟 Welcome to Divine Tales</h1>

    <p>Once upon a time, in a magical land...</p>

    <button onclick="showStory()">Read Story</button>

    <p id="story"></p>

    <script>
        function showStory() {
            document.getElementById("story").innerText =
            "A brave little star went on an adventure and saved the night sky!";
        }
    </script>
</body>
</html>
